<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRASI FASI XIII & GUNTARA I KAB. BARITO KUALA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid #1a73e8; }
        .header-logos img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; text-transform: uppercase; font-size: 1.2em; line-height: 1.3; }
        .sub { text-align: center; color: #555; font-size: 0.9em; margin-bottom: 20px; line-height: 1.5; font-weight: 500; }
        label { font-weight: 600; display: block; margin-top: 15px; font-size: 0.9em; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn-cek { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-cek:hover { background: #1557b0; }
        .btn-daftar { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: none; text-align: center; display: none; padding: 14px; border-radius: 10px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; text-align: center; font-size: 14px; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
<div class="card">
    <div class="header-logos">
        <img src="BKPRMI LPPTKA SELIDAH.jpg" alt="Logo LPPTKA BKPRMI Barito Kuala">
    </div>
    <h2>REGISTRASI FASI XIII DAN GUNTARA I<br>TINGKAT KABUPATEN BARITO KUALA</h2>
    <p class="sub">LPPTKA BKPRMI KAB. BARITO KUALA<br>Seleksi Otomatis Berdasarkan Juknis 2026</p>

    <label>Nama Lengkap Santri/Ustadz:</label>
    <input type="text" id="nama" placeholder="Sesuai Ijazah/KK">

    <label>Unit TK/TP Al-Qur'an:</label>
    <input type="text" id="unit" placeholder="Contoh: Unit 005 Barambai">

    <label>Kategori Lomba:</label>
    <select id="kategori">
        <optgroup label="FASI XIII (Santri)">
            <option value="TKA">TKA (Maksimal 7 Tahun)</option>
            <option value="TPA">TPA (Di atas 7 - 12 Tahun)</option>
            <option value="TQA">TQA (Di atas 12 - 15 Tahun)</option>
        </optgroup>
        <optgroup label="GUNTARA I (Ustadz/ah)">
            <option value="GUNTARA">GUNTARA (18 - 45 Tahun)</option>
        </optgroup>
    </select>

    <label>Jenis Kepesertaan:</label>
    <select id="jenis">
        <option value="PERORANGAN">PERORANGAN</option>
        <option value="GROUP">GROUP / BEREGU</option>
    </select>

    <label>Tanggal Lahir:</label>
    <input type="date" id="tglLahir">

    <button class="btn-cek" onclick="validasi()">Verifikasi Kelayakan Umur</button>
    <div id="result"></div>
    <a href="#" id="linkDaftar" class="btn-daftar" target="_blank">Lanjut ke Formulir Pendaftaran →</a>
</div>

<script>
function validasi() {
    const nama = document.getElementById('nama').value.trim();
    const tglInput = document.getElementById('tglLahir').value;
    const kategori = document.getElementById('kategori').value;
    const jenis = document.getElementById('jenis').value;
    
    // Link pendaftaran Google Form
    const links = {
        "TKA": { "PERORANGAN": "https://forms.gle/kpwFuToc5gdX3sU38", "GROUP": "https://forms.gle/hDcr8RTVtX7AVqzv5" },
        "TPA": { "PERORANGAN": "https://forms.gle/kpwFuToc5gdX3sU38", "GROUP": "https://forms.gle/hDcr8RTVtX7AVqzv5" },
        "TQA": { "PERORANGAN": "https://forms.gle/kpwFuToc5gdX3sU38", "GROUP": "https://forms.gle/hDcr8RTVtX7AVqzv5" },
        "GUNTARA": { "PERORANGAN": "https://forms.gle/Ecf8Qmg5tWgFMfCC8", "GROUP": "https://forms.gle/v8tDH9KnTvoUWfpW6" }
    };

    if (!nama || !tglInput) { alert("Mohon isi Nama dan Tanggal Lahir!"); return; }

    const tglLahir = new Date(tglInput);
    const tglCutOff = new Date('2026-07-01');
    let thn = tglCutOff.getFullYear() - tglLahir.getFullYear();
    let bln = tglCutOff.getMonth() - tglLahir.getMonth();
    if (bln < 0 || (bln === 0 && tglCutOff.getDate() < tglLahir.getDate())) { thn--; }

    let min = 0, max = 0;
    if (kategori === "TKA") { max = 7; }
    else if (kategori === "TPA") { min = 7; max = 12; }
    else if (kategori === "TQA") { min = 12; max = 15; }
    else if (kategori === "GUNTARA") { min = 18; max = 45; }

    const result = document.getElementById('result');
    const btn = document.getElementById('linkDaftar');
    result.style.display = "block";

    if (thn < min || thn >= max) {
        result.className = "error";
        result.innerHTML = `⚠️ <strong>Pendaftaran Ditolak</strong><br>Umur Anda per 1 Juli 2026 adalah ${thn} tahun. Tidak sesuai kriteria ${kategori}.`;
        btn.style.display = "none";
    } else {
        result.className = "success";
        result.innerHTML = `✅ <strong>Verifikasi Berhasil</strong><br>Silakan lanjut mendaftar sebagai ${kategori} ${jenis}.`;
        btn.href = links[kategori][jenis];
        btn.style.display = "block";
    }
}
</script>
</body>
</html>
